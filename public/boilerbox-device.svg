<svg viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient definition -->
  <defs>
    <linearGradient id="deviceGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="topGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Main device body -->
  <g>
    <!-- Front face -->
    <rect x="60" y="60" width="280" height="160" rx="8" fill="url(#deviceGradient)" stroke="#404040" stroke-width="2"/>

    <!-- Top red accent stripe -->
    <rect x="60" y="60" width="280" height="35" rx="8" fill="url(#topGradient)" stroke="#d42020" stroke-width="2"/>

    <!-- BoilerBox text -->
    <text x="200" y="95" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="2">
      BOILER
    </text>

    <!-- 360 text -->
    <text x="200" y="125" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ef4444" text-anchor="middle" letter-spacing="4">
      360
    </text>

    <!-- Ports on front -->
    <g stroke="#555" stroke-width="1.5" fill="none">
      <!-- USB ports -->
      <rect x="80" y="160" width="12" height="8" rx="1"/>
      <rect x="100" y="160" width="12" height="8" rx="1"/>
      <rect x="120" y="160" width="12" height="8" rx="1"/>

      <!-- Ethernet port -->
      <rect x="290" y="160" width="16" height="10" rx="1"/>
    </g>

    <!-- Port labels -->
    <text x="95" y="180" font-family="Arial, sans-serif" font-size="7" fill="#888" text-anchor="middle">USB</text>
    <text x="298" y="180" font-family="Arial, sans-serif" font-size="7" fill="#888" text-anchor="middle">ETH</text>

    <!-- LED indicators -->
    <g>
      <circle cx="160" cy="145" r="3" fill="#22c55e"/>
      <circle cx="175" cy="145" r="3" fill="#22c55e"/>
      <circle cx="190" cy="145" r="3" fill="#3b82f6"/>
    </g>

    <!-- Power button area -->
    <circle cx="230" cy="145" r="4" fill="none" stroke="#ef4444" stroke-width="2"/>
    <circle cx="230" cy="145" r="2" fill="#ef4444" opacity="0.7"/>
  </g>

  <!-- 3D perspective effect - side panel -->
  <g opacity="0.6">
    <polygon points="340,60 360,50 360,210 340,220" fill="#1a1a1a" stroke="#404040" stroke-width="1"/>
  </g>

  <!-- 3D perspective effect - bottom panel -->
  <g opacity="0.4">
    <polygon points="60,220 340,220 360,210 80,210" fill="#0a0a0a" stroke="#404040" stroke-width="1"/>
  </g>
</svg>